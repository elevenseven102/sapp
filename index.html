<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Сканер документов</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }
    #viewfinder {
      flex: 1;
      position: relative;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    video, canvas {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
    }
    #outputCanvas {
      display: none;
      z-index: 10;
    }
    #overlayCanvas {
      z-index: 5;
      pointer-events: none;
    }
    #controls {
      padding: 12px;
      background: #1a1a1a;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    button, .file-label {
      background: #0a84ff;
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled, .file-label:disabled { opacity: 0.5; pointer-events: none; }
    input[type="file"] { display: none; }
    #status {
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="viewfinder">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlayCanvas"></canvas>
    <canvas id="outputCanvas"></canvas>
  </div>
  <div id="controls">
    <button id="captureBtn" disabled>📷 Сканировать</button>
    <label for="fileInput" class="file-label">🖼️ Из галереи</label>
    <input type="file" id="fileInput" accept="image/*">
    <button id="downloadPdfBtn" disabled>📄 Сохранить PDF</button>
    <div id="status">Загрузка библиотек...</div>
  </div>

  <!-- OpenCV 4.7.0 (асинхронно) -->
  <script src="https://docs.opencv.org/4.7.0/opencv.js" async id="opencvScript"></script>
  <!-- jscanify – обёртка над OpenCV для выделения документов -->
  <script src="https://cdn.jsdelivr.net/gh/ColonelParrot/jscanify@master/src/jscanify.min.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="app.js"></script>
</body>
</html>
